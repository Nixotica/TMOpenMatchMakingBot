name: Deploy AWS Stack

on:
  push:
    branches:
      - master

jobs:
  pre-commit:
    name: Run Pre-Commit Hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"  # Change this to match your project

      - name: Install Pre-Commit
        run: pip install pre-commit

      - name: Run Pre-Commit Hooks
        run: |
          pre-commit install --config lib/mm-bot/.pre-commit-config.yaml
          pre-commit run --config lib/mm-bot/.pre-commit-config.yaml --all-files

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: pre-commit

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Pytest
        run: |
          cd lib/mm-bot/
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pytest --maxfail=1 --disable-warnings 

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    env:
      STAGE: prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Deploy Stack
        run: |
          npm install -g aws-cdk
          npm install -g ts-node
          npm install  
          npm install --save-dev @types/node
          cdk synth  
          cdk deploy --all --require-approval never

      - name: Associate EIP to EC2
        run: |
          INSTANCE_ARN=$(aws ecs list-container-instances --cluster MM-Bot-Cluster-prod \
            --query 'containerInstanceArns[0]' --output text)
        
          EC2_ID=$(aws ecs describe-container-instances --cluster MM-Bot-Cluster-prod \
            --container-instances "$INSTANCE_ARN" \
            --query 'containerInstances[0].ec2InstanceId' --output text)

          ENI_ID=$(aws ec2 describe-instances \
            --instance-ids $EC2_ID \
            --query 'Reservations[0].Instances[0].NetworkInterfaces[0].NetworkInterfaceId' \
            --output text)

          aws ec2 associate-address \
            --allocation-id eipalloc-0fae76a43ff8b3496 \
            --network-interface-id $ENI_ID \
            --allow-reassociation
        